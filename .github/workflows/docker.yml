name: docker

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t app .

      - name: Start container
        run: docker run -d --name app -p 9292:9292 -e PORT=9292 app

      - name: Wait for container to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf -o /dev/null -w "%{http_code}" http://localhost:9292/ 2>/dev/null | grep -q "410"; then
              echo "App is ready"
              exit 0
            fi
            echo "Waiting... ($i)"
            sleep 2
          done
          echo "App failed to become ready"
          docker logs app
          exit 1

      - name: Smoke test — expect HTTP 410
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9292/)
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "410" ]
